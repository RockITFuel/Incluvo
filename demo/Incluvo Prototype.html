<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Incluvo — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Inter:wght@400;500;600;700&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="page-welkom.jsx"></script>
<script type="text/babel" src="page-taken.jsx"></script>
<script type="text/babel" src="page-coachplan.jsx"></script>
<script type="text/babel" src="page-cursussen.jsx"></script>
<script type="text/babel" src="page-chat.jsx"></script>
<script type="text/babel" src="page-coach.jsx"></script>
<script type="text/babel" src="page-coach-plan.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

function App() {
  const [role, setRole] = useState('leerling');
  const [page, setPage] = useState('welkom');
  const [a11yOpen, setA11yOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);

  // when role changes, jump to first page of role
  useEffect(() => {
    if (role === 'leerling' && !['welkom','taken','cursussen','coachplan','chat'].includes(page)) setPage('welkom');
    if (role === 'coach' && !['dashboard','coachplan-vul','cursusbouwer','chat'].includes(page)) setPage('dashboard');
  }, [role]);

  useEffect(() => { setMenuOpen(false); }, [page, role]);

  const ctx = { role, setRole, page, setPage, a11yOpen, setA11yOpen, menuOpen, setMenuOpen };

  const pageNode = useMemo(() => {
    if (role === 'leerling') {
      switch (page) {
        case 'welkom': return { crumbs:['Leerling','Welkom'], el: <Welkom/> };
        case 'taken': return { crumbs:['Leerling','Mijn taken'], el: <Taken/> };
        case 'cursussen': return { crumbs:['Leerling','Cursussen'], el: <Cursussen/> };
        case 'coachplan': return { crumbs:['Leerling','Mijn plan'], el: <Coachplan/> };
        case 'chat': return { crumbs:['Leerling','Chat'], el: <Chat/> };
      }
    } else {
      switch (page) {
        case 'dashboard': return { crumbs:['Coach','Dashboard'], el: <CoachDashboard/> };
        case 'coachplan-vul': return { crumbs:['Coach','Coachplannen','Sami Jansen'], el: <CoachplanVul/> };
        case 'cursusbouwer': return { crumbs:['Coach','Cursusbouwer','Tekst structureren'], el: <Cursusbouwer/> };
        case 'chat': return { crumbs:['Coach','Chat'], el: <Chat/> };
      }
    }
    return { crumbs:['—'], el: <div/> };
  }, [role, page]);

  return (
    <AppCtx.Provider value={ctx}>
      <Shell crumbs={pageNode.crumbs}>{pageNode.el}</Shell>
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
