name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - run: bun install
      - run: bun run check-types
      - run: bun run lint

  build-and-push:
    name: Build & Push (${{ matrix.app.name }})
    needs: check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - name: server
            dockerfile: apps/server/Dockerfile
            image: youriheuvel/incluvo-server
          - name: web
            dockerfile: apps/web/Dockerfile
            image: youriheuvel/incluvo-web
    steps:
      - uses: actions/checkout@v4

      # Log in to Docker Hub BEFORE booting buildx so the buildkit image is
      # pulled authenticated (anonymous pulls hit Docker Hub rate limits and
      # time out on shared runner IPs).
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.app.dockerfile }}
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ matrix.app.image }}:latest
            ${{ matrix.app.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app.name }}

      - name: Deploy to Dokploy
        if: ${{ env.DOKPLOY_URL != '' }}
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APP_ID_SERVER: ${{ secrets.DOKPLOY_APP_ID_SERVER }}
          DOKPLOY_APP_ID_WEB: ${{ secrets.DOKPLOY_APP_ID_WEB }}
          APP_NAME: ${{ matrix.app.name }}
          DOCKER_IMAGE: ${{ matrix.app.image }}:latest
        run: |
          if [ "$APP_NAME" = "server" ]; then
            DOKPLOY_APP_ID="$DOKPLOY_APP_ID_SERVER"
          else
            DOKPLOY_APP_ID="$DOKPLOY_APP_ID_WEB"
          fi

          curl -sf -X POST "$DOKPLOY_URL/api/application.saveDockerProvider" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -d "{\"applicationId\": \"$DOKPLOY_APP_ID\", \"dockerImage\": \"$DOCKER_IMAGE\"}"

          curl -sf -X POST "$DOKPLOY_URL/api/application.redeploy" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -d "{\"applicationId\": \"$DOKPLOY_APP_ID\"}"

          echo "Deployed $DOCKER_IMAGE to Dokploy"
